services:
  - type: web
    name: labellens-api
    runtime: node
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        value: https://labellens.app
      - key: GROQ_API_KEY
        sync: false
